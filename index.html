<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mandelbrot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0c;
      color: #e8e8ec;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
      -webkit-user-select: none;
      user-select: none;
    }
    #c {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #c.dragging { cursor: grabbing; }
    #c.ctrl-ready,
    #c.selecting { cursor: crosshair; }
    #marquee {
      position: fixed;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: rgba(140, 170, 255, 0.14);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      z-index: 2;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 1;
    }
    #info {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: rgba(232, 232, 236, 0.92);
      line-height: 1.45;
      white-space: pre-line;
      background: rgba(10, 10, 14, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 6px 10px;
    }
    #actions {
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }
    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(18, 18, 22, 0.72);
      color: rgba(232, 232, 236, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 6px 12px;
      font: inherit;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    button:hover {
      background: rgba(36, 36, 44, 0.85);
      border-color: rgba(255, 255, 255, 0.28);
    }
    button:active {
      background: rgba(50, 50, 60, 0.9);
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="marquee" aria-hidden="true"></div>
  <div id="hud">
    <div id="info"></div>
    <div id="actions">
      <button type="button" id="btn-reset" title="Reset view">Reset</button>
    </div>
  </div>
  <script>
(function () {
  "use strict";

  // ── Pure math (exported for tests via global) ──────────────────────────

  /**
   * Escape-time iteration for c = cx + i·cy.
   * Returns iteration count at escape (1..maxIter), or maxIter if |z| stayed ≤ 2.
   */
  function mandelbrotEscape(cx, cy, maxIter) {
    var zx = 0, zy = 0;
    var zx2 = 0, zy2 = 0;
    var i = 0;
    while (i < maxIter && zx2 + zy2 <= 4) {
      zy = 2 * zx * zy + cy;
      zx = zx2 - zy2 + cx;
      zx2 = zx * zx;
      zy2 = zy * zy;
      i++;
    }
    return i;
  }

  /**
   * Smooth escape count for exterior coloring (continuous banding).
   * Returns value in (0, maxIter] for exterior, maxIter for interior.
   */
  function mandelbrotSmooth(cx, cy, maxIter) {
    var zx = 0, zy = 0;
    var zx2 = 0, zy2 = 0;
    var i = 0;
    while (i < maxIter && zx2 + zy2 <= 256) {
      zy = 2 * zx * zy + cy;
      zx = zx2 - zy2 + cx;
      zx2 = zx * zx;
      zy2 = zy * zy;
      i++;
    }
    if (i >= maxIter) return maxIter;
    var logZn = Math.log(zx2 + zy2) / 2;
    var nu = Math.log(logZn / Math.LN2) / Math.LN2;
    return i + 1 - nu;
  }

  /** Map pixel (px, py) in a canvas of size (w, h) to complex plane given view. */
  function pixelToComplex(px, py, w, h, centerX, centerY, planeWidth) {
    var aspect = w / h;
    var planeHeight = planeWidth / aspect;
    var re = centerX + (px / w - 0.5) * planeWidth;
    var im = centerY - (py / h - 0.5) * planeHeight;
    return { re: re, im: im };
  }

  /**
   * Zoom about a pixel so that pixel's complex point stays fixed.
   * factor < 1 zooms in, > 1 zooms out.
   */
  function zoomAtPoint(px, py, w, h, centerX, centerY, planeWidth, factor) {
    var before = pixelToComplex(px, py, w, h, centerX, centerY, planeWidth);
    var newWidth = planeWidth * factor;
    if (newWidth < Number.MIN_VALUE * 1e6) newWidth = Number.MIN_VALUE * 1e6;
    if (!isFinite(newWidth) || newWidth > 1e6) newWidth = Math.min(planeWidth * factor, 1e6);
    var after = pixelToComplex(px, py, w, h, centerX, centerY, newWidth);
    return {
      centerX: centerX + (before.re - after.re),
      centerY: centerY + (before.im - after.im),
      planeWidth: newWidth
    };
  }

  /** Pan by pixel deltas → new center. dy positive is downward (screen). */
  function panByPixels(dx, dy, w, h, centerX, centerY, planeWidth) {
    var aspect = w / h;
    var planeHeight = planeWidth / aspect;
    return {
      centerX: centerX - (dx / w) * planeWidth,
      centerY: centerY + (dy / h) * planeHeight,
      planeWidth: planeWidth
    };
  }

  /**
   * Zoom so the axis-aligned pixel rect becomes the new viewport.
   * Fits the selection fully, expanding on the short side to match canvas aspect.
   */
  function zoomToRect(x0, y0, x1, y1, w, h, centerX, centerY, planeWidth) {
    var left = Math.min(x0, x1);
    var right = Math.max(x0, x1);
    var top = Math.min(y0, y1);
    var bottom = Math.max(y0, y1);
    var pxW = right - left;
    var pxH = bottom - top;
    if (pxW < 4 || pxH < 4) return null;

    var cTL = pixelToComplex(left, top, w, h, centerX, centerY, planeWidth);
    var cBR = pixelToComplex(right, bottom, w, h, centerX, centerY, planeWidth);
    var reMin = Math.min(cTL.re, cBR.re);
    var reMax = Math.max(cTL.re, cBR.re);
    var imMin = Math.min(cTL.im, cBR.im);
    var imMax = Math.max(cTL.im, cBR.im);
    var selW = reMax - reMin;
    var selH = imMax - imMin;
    var newCenterX = (reMin + reMax) / 2;
    var newCenterY = (imMin + imMax) / 2;

    var aspect = w / h;
    var newWidth = Math.max(selW, selH * aspect);
    if (newWidth < Number.MIN_VALUE * 1e6) newWidth = Number.MIN_VALUE * 1e6;
    if (!isFinite(newWidth) || newWidth > 1e6) {
      newWidth = Math.min(Math.max(selW, selH * aspect), 1e6);
    }
    if (!isFinite(newWidth) || newWidth <= 0) return null;

    return {
      centerX: newCenterX,
      centerY: newCenterY,
      planeWidth: newWidth
    };
  }

  /** HSL-like palette: interior black, exterior smooth bands. */
  function colorFor(t, maxIt, out, off) {
    if (t >= maxIt) {
      out[off] = 8;
      out[off + 1] = 8;
      out[off + 2] = 12;
      out[off + 3] = 255;
      return;
    }
    var v = t / maxIt;
    var hue = (0.62 + 4.5 * v) % 1;
    var sat = 0.72;
    var lit = 0.12 + 0.55 * Math.pow(v, 0.55);
    var c = (1 - Math.abs(2 * lit - 1)) * sat;
    var x = c * (1 - Math.abs((hue * 6) % 2 - 1));
    var m = lit - c / 2;
    var r = 0, g = 0, b = 0;
    var h6 = hue * 6;
    if (h6 < 1) { r = c; g = x; b = 0; }
    else if (h6 < 2) { r = x; g = c; b = 0; }
    else if (h6 < 3) { r = 0; g = c; b = x; }
    else if (h6 < 4) { r = 0; g = x; b = c; }
    else if (h6 < 5) { r = x; g = 0; b = c; }
    else { r = c; g = 0; b = x; }
    out[off] = Math.round((r + m) * 255);
    out[off + 1] = Math.round((g + m) * 255);
    out[off + 2] = Math.round((b + m) * 255);
    out[off + 3] = 255;
  }

  /**
   * Full-frame CPU paint (naive baseline / fallback). Synchronous.
   * Writes RGBA into out (Uint8ClampedArray length w*h*4) or allocates.
   */
  function paintCpuFullFrame(w, h, centerX, centerY, planeWidth, maxIter, out) {
    var data = out || new Uint8ClampedArray(w * h * 4);
    var aspect = w / h;
    var ph = planeWidth / aspect;
    var re0 = centerX - planeWidth / 2;
    var im0 = centerY + ph / 2;
    var dre = planeWidth / w;
    var dim = -ph / h;
    for (var y = 0; y < h; y++) {
      var im = im0 + y * dim;
      var rowOff = y * w * 4;
      for (var x = 0; x < w; x++) {
        var re = re0 + x * dre;
        var t = mandelbrotSmooth(re, im, maxIter);
        colorFor(t, maxIter, data, rowOff + x * 4);
      }
    }
    return data;
  }

  /**
   * Split a JS float64 into two float32s (hi, lo) so hi+lo ≈ x with double-single precision.
   * Used to upload view params to the emulated-double WebGL path.
   */
  function splitDouble(x) {
    var hi = Math.fround(x);
    var lo = Math.fround(x - hi);
    return { hi: hi, lo: lo };
  }

  function joinDouble(hi, lo) {
    return hi + lo;
  }

  // Expose pure API for Node tests (no DOM dependency for math)
  var MandelbrotMath = {
    mandelbrotEscape: mandelbrotEscape,
    mandelbrotSmooth: mandelbrotSmooth,
    pixelToComplex: pixelToComplex,
    zoomAtPoint: zoomAtPoint,
    panByPixels: panByPixels,
    zoomToRect: zoomToRect,
    colorFor: colorFor,
    paintCpuFullFrame: paintCpuFullFrame,
    splitDouble: splitDouble,
    joinDouble: joinDouble
  };
  if (typeof globalThis !== "undefined") {
    globalThis.MandelbrotMath = MandelbrotMath;
  }

  // ── View state ─────────────────────────────────────────────────────────

  var DEFAULT_CENTER_X = -0.5;
  var DEFAULT_CENTER_Y = 0;
  var DEFAULT_PLANE_WIDTH = 3.5;

  var view = {
    centerX: DEFAULT_CENTER_X,
    centerY: DEFAULT_CENTER_Y,
    planeWidth: DEFAULT_PLANE_WIDTH
  };

  var maxIter = 256;

  function iterationsForZoom(planeWidth) {
    var base = 128;
    var depth = Math.max(0, -Math.log2(planeWidth / DEFAULT_PLANE_WIDTH));
    return Math.min(4096, Math.floor(base + depth * 48));
  }

  // ── Renderer: WebGL (primary) + Canvas2D CPU (fallback) ────────────────

  var canvas = document.getElementById("c");
  var infoEl = document.getElementById("info");
  var dpr = 1;
  var imgW = 0, imgH = 0;
  var dirty = true;
  var rendering = false;
  var renderToken = 0;
  var backend = "none";

  // CPU state
  var ctx2d = null;
  var imageData = null;

  // WebGL state
  var gl = null;
  var glProgram = null;
  var glUniforms = null;

  var VERT_SRC =
    "attribute vec2 a_pos;\n" +
    "void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }\n";

  // Fragment shader: escape-time + palette matching JS, with double-single (ds)
  // arithmetic so deep zoom has float64-class precision (not native float32).
  // Uniforms for center/planeWidth are split float64 pairs: vec2(hi, lo).
  // gl_FragCoord is bottom-left; imag orientation matches the JS path.
  var FRAG_SRC =
    "precision highp float;\n" +
    "uniform vec2 u_res;\n" +
    "uniform vec2 u_centerX;\n" +
    "uniform vec2 u_centerY;\n" +
    "uniform vec2 u_planeWidth;\n" +
    "uniform float u_maxIter;\n" +
    "\n" +
    "// Double-single: vec2(hi, lo). Algorithms after Hida/Li/Bailey / NVIDIA ds.\n" +
    "vec2 ds_add(vec2 a, vec2 b) {\n" +
    "  float t1 = a.x + b.x;\n" +
    "  float e = t1 - a.x;\n" +
    "  float t2 = ((b.x - e) + (a.x - (t1 - e))) + a.y + b.y;\n" +
    "  float hi = t1 + t2;\n" +
    "  return vec2(hi, t2 - (hi - t1));\n" +
    "}\n" +
    "vec2 ds_sub(vec2 a, vec2 b) {\n" +
    "  return ds_add(a, vec2(-b.x, -b.y));\n" +
    "}\n" +
    "vec2 ds_mul(vec2 a, vec2 b) {\n" +
    "  float cona = a.x * 8193.0;\n" +
    "  float conb = b.x * 8193.0;\n" +
    "  float a1 = cona - (cona - a.x);\n" +
    "  float b1 = conb - (conb - b.x);\n" +
    "  float a2 = a.x - a1;\n" +
    "  float b2 = b.x - b1;\n" +
    "  float c11 = a.x * b.x;\n" +
    "  float c21 = a2 * b2 + (a2 * b1 + (a1 * b2 + (a1 * b1 - c11)));\n" +
    "  float c2 = a.x * b.y + a.y * b.x;\n" +
    "  float t1 = c11 + c2;\n" +
    "  float e = t1 - c11;\n" +
    "  float t2 = ((c2 - e) + (c11 - (t1 - e))) + c21 + a.y * b.y;\n" +
    "  float hi = t1 + t2;\n" +
    "  return vec2(hi, t2 - (hi - t1));\n" +
    "}\n" +
    "\n" +
    "vec3 hsl2rgb(float h, float s, float l) {\n" +
    "  float c = (1.0 - abs(2.0 * l - 1.0)) * s;\n" +
    "  float x = c * (1.0 - abs(mod(h * 6.0, 2.0) - 1.0));\n" +
    "  float m = l - c * 0.5;\n" +
    "  vec3 rgb;\n" +
    "  float h6 = h * 6.0;\n" +
    "  if (h6 < 1.0) rgb = vec3(c, x, 0.0);\n" +
    "  else if (h6 < 2.0) rgb = vec3(x, c, 0.0);\n" +
    "  else if (h6 < 3.0) rgb = vec3(0.0, c, x);\n" +
    "  else if (h6 < 4.0) rgb = vec3(0.0, x, c);\n" +
    "  else if (h6 < 5.0) rgb = vec3(x, 0.0, c);\n" +
    "  else rgb = vec3(c, 0.0, x);\n" +
    "  return rgb + m;\n" +
    "}\n" +
    "\n" +
    "void main() {\n" +
    "  float aspect = u_res.x / u_res.y;\n" +
    "  // planeHeight = planeWidth / aspect (aspect is O(1); mul by reciprocal is fine)\n" +
    "  vec2 planeHeight = ds_mul(u_planeWidth, vec2(1.0 / aspect, 0.0));\n" +
    "  vec2 tRe = vec2(gl_FragCoord.x / u_res.x - 0.5, 0.0);\n" +
    "  vec2 tIm = vec2(gl_FragCoord.y / u_res.y - 0.5, 0.0);\n" +
    "  vec2 re = ds_add(u_centerX, ds_mul(tRe, u_planeWidth));\n" +
    "  vec2 im = ds_add(u_centerY, ds_mul(tIm, planeHeight));\n" +
    "\n" +
    "  vec2 zx = vec2(0.0);\n" +
    "  vec2 zy = vec2(0.0);\n" +
    "  float i = 0.0;\n" +
    "  float mag2 = 0.0;\n" +
    "  for (int n = 0; n < 4096; n++) {\n" +
    "    if (i >= u_maxIter || mag2 > 256.0) break;\n" +
    "    // z <- z^2 + c  with double-single ops\n" +
    "    vec2 zx2 = ds_mul(zx, zx);\n" +
    "    vec2 zy2 = ds_mul(zy, zy);\n" +
    "    vec2 zxzy = ds_mul(zx, zy);\n" +
    "    zy = ds_add(ds_add(zxzy, zxzy), im);\n" +
    "    zx = ds_add(ds_sub(zx2, zy2), re);\n" +
    "    // |z|^2 from high parts (+ cross terms) for bailout\n" +
    "    mag2 = zx.x * zx.x + zy.x * zy.x;\n" +
    "    i += 1.0;\n" +
    "  }\n" +
    "\n" +
    "  if (i >= u_maxIter) {\n" +
    "    gl_FragColor = vec4(8.0/255.0, 8.0/255.0, 12.0/255.0, 1.0);\n" +
    "    return;\n" +
    "  }\n" +
    "  float logZn = log(mag2) * 0.5;\n" +
    "  float nu = log(logZn / log(2.0)) / log(2.0);\n" +
    "  float t = i + 1.0 - nu;\n" +
    "  float v = t / u_maxIter;\n" +
    "  float hue = mod(0.62 + 4.5 * v, 1.0);\n" +
    "  float sat = 0.72;\n" +
    "  float lit = 0.12 + 0.55 * pow(v, 0.55);\n" +
    "  vec3 rgb = hsl2rgb(hue, sat, lit);\n" +
    "  gl_FragColor = vec4(rgb, 1.0);\n" +
    "}\n";

  function compileShader(glctx, type, src) {
    var sh = glctx.createShader(type);
    glctx.shaderSource(sh, src);
    glctx.compileShader(sh);
    if (!glctx.getShaderParameter(sh, glctx.COMPILE_STATUS)) {
      var info = glctx.getShaderInfoLog(sh);
      glctx.deleteShader(sh);
      throw new Error("shader compile: " + info);
    }
    return sh;
  }

  function initWebGL(canvasEl) {
    var opts = {
      alpha: false,
      antialias: false,
      depth: false,
      stencil: false,
      preserveDrawingBuffer: true,
      powerPreference: "high-performance"
    };
    var g =
      canvasEl.getContext("webgl", opts) ||
      canvasEl.getContext("experimental-webgl", opts);
    if (!g) return null;

    var vs = compileShader(g, g.VERTEX_SHADER, VERT_SRC);
    var fs = compileShader(g, g.FRAGMENT_SHADER, FRAG_SRC);
    var prog = g.createProgram();
    g.attachShader(prog, vs);
    g.attachShader(prog, fs);
    g.linkProgram(prog);
    if (!g.getProgramParameter(prog, g.LINK_STATUS)) {
      throw new Error("program link: " + g.getProgramInfoLog(prog));
    }
    g.useProgram(prog);

    var buf = g.createBuffer();
    g.bindBuffer(g.ARRAY_BUFFER, buf);
    // full-screen triangle strip (two triangles as clip-space quad)
    g.bufferData(
      g.ARRAY_BUFFER,
      new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
      g.STATIC_DRAW
    );
    var aPos = g.getAttribLocation(prog, "a_pos");
    g.enableVertexAttribArray(aPos);
    g.vertexAttribPointer(aPos, 2, g.FLOAT, false, 0, 0);

    var uniforms = {
      res: g.getUniformLocation(prog, "u_res"),
      centerX: g.getUniformLocation(prog, "u_centerX"),
      centerY: g.getUniformLocation(prog, "u_centerY"),
      planeWidth: g.getUniformLocation(prog, "u_planeWidth"),
      maxIter: g.getUniformLocation(prog, "u_maxIter")
    };

    g.disable(g.DEPTH_TEST);
    g.disable(g.BLEND);

    return { gl: g, program: prog, uniforms: uniforms };
  }

  function ensureWebGL() {
    // Setting canvas.width/height resets the WebGL context; rebuild if needed.
    if (!gl || gl.isContextLost()) {
      var webgl = initWebGL(canvas);
      if (!webgl) {
        backend = "cpu";
        if (!ctx2d) ctx2d = canvas.getContext("2d", { alpha: false });
        return false;
      }
      gl = webgl.gl;
      glProgram = webgl.program;
      glUniforms = webgl.uniforms;
      backend = "webgl";
      return true;
    }
    // Context exists but programs may be wiped after a canvas size change.
    // Detect by checking the program is still valid.
    if (!glProgram || !gl.getProgramParameter(glProgram, gl.LINK_STATUS)) {
      var rebuilt = initWebGL(canvas);
      if (!rebuilt) {
        backend = "cpu";
        if (!ctx2d) ctx2d = canvas.getContext("2d", { alpha: false });
        return false;
      }
      gl = rebuilt.gl;
      glProgram = rebuilt.program;
      glUniforms = rebuilt.uniforms;
    }
    return true;
  }

  function paintWebGL(sync) {
    if (!ensureWebGL()) {
      // Fall back mid-flight
      if (!imageData && ctx2d) imageData = ctx2d.createImageData(imgW, imgH);
      paintCpuFullFrame(imgW, imgH, view.centerX, view.centerY, view.planeWidth, maxIter, imageData.data);
      ctx2d.putImageData(imageData, 0, 0);
      return;
    }
    var g = gl;
    g.viewport(0, 0, imgW, imgH);
    g.useProgram(glProgram);
    g.uniform2f(glUniforms.res, imgW, imgH);
    var cx = splitDouble(view.centerX);
    var cy = splitDouble(view.centerY);
    var pw = splitDouble(view.planeWidth);
    g.uniform2f(glUniforms.centerX, cx.hi, cx.lo);
    g.uniform2f(glUniforms.centerY, cy.hi, cy.lo);
    g.uniform2f(glUniforms.planeWidth, pw.hi, pw.lo);
    g.uniform1f(glUniforms.maxIter, maxIter);
    g.drawArrays(g.TRIANGLE_STRIP, 0, 4);
    if (sync) {
      // Force GPU completion: finish + 1px readback (some drivers treat finish as a no-op hint)
      g.finish();
      var probe = new Uint8Array(4);
      g.readPixels(0, 0, 1, 1, g.RGBA, g.UNSIGNED_BYTE, probe);
    }
  }

  function paintCpuChunked(token) {
    if (token !== renderToken) return;
    var data = imageData.data;
    var w = imgW, h = imgH;
    var cx = view.centerX, cy = view.centerY, pw = view.planeWidth;
    var aspect = w / h;
    var ph = pw / aspect;
    var re0 = cx - pw / 2;
    var im0 = cy + ph / 2;
    var dre = pw / w;
    var dim = -ph / h;
    var rowsPerChunk = Math.max(4, Math.floor(120000 / w));
    var y = 0;

    function step() {
      if (token !== renderToken) return;
      var yEnd = Math.min(h, y + rowsPerChunk);
      for (; y < yEnd; y++) {
        var im = im0 + y * dim;
        var rowOff = y * w * 4;
        for (var x = 0; x < w; x++) {
          var re = re0 + x * dre;
          var t = mandelbrotSmooth(re, im, maxIter);
          colorFor(t, maxIter, data, rowOff + x * 4);
        }
      }
      ctx2d.putImageData(imageData, 0, 0);
      if (y < h) {
        requestAnimationFrame(step);
      } else {
        rendering = false;
        updateHud();
      }
    }
    requestAnimationFrame(step);
  }

  /** Full-frame paint used by the live app (and perf harness). */
  function paintFrame(token, sync) {
    maxIter = iterationsForZoom(view.planeWidth);
    if (backend === "webgl") {
      paintWebGL(!!sync);
      rendering = false;
      updateHud();
      return;
    }
    // CPU fallback: chunked unless sync (perf / forced full frame)
    if (sync) {
      paintCpuFullFrame(imgW, imgH, view.centerX, view.centerY, view.planeWidth, maxIter, imageData.data);
      ctx2d.putImageData(imageData, 0, 0);
      rendering = false;
      updateHud();
      return;
    }
    paintCpuChunked(token);
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    var cssW = window.innerWidth;
    var cssH = window.innerHeight;
    var nextW = Math.max(1, Math.floor(cssW * dpr));
    var nextH = Math.max(1, Math.floor(cssH * dpr));
    var sizeChanged = nextW !== imgW || nextH !== imgH;
    imgW = nextW;
    imgH = nextH;
    if (sizeChanged || canvas.width !== imgW || canvas.height !== imgH) {
      canvas.width = imgW;
      canvas.height = imgH;
      // Canvas resize resets WebGL; rebuild programs/buffers
      if (backend === "webgl") {
        gl = null;
        glProgram = null;
        glUniforms = null;
        ensureWebGL();
      }
    }
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    if (backend === "cpu" && ctx2d) {
      imageData = ctx2d.createImageData(imgW, imgH);
    }
    dirty = true;
  }

  function updateHud() {
    var zoom = DEFAULT_PLANE_WIDTH / view.planeWidth;
    var zoomStr = zoom >= 1e6
      ? zoom.toExponential(2)
      : zoom >= 1000
        ? zoom.toFixed(0)
        : zoom.toFixed(2);
    infoEl.textContent =
      "zoom ×" + zoomStr +
      "\niter " + maxIter +
      "\n" + view.centerX.toPrecision(8) + " + " + view.centerY.toPrecision(8) + "i";
  }

  function requestRender() {
    dirty = true;
  }

  function frame() {
    if (dirty) {
      dirty = false;
      rendering = true;
      renderToken++;
      // WebGL paints in one shot; CPU may chunk
      paintFrame(renderToken, false);
    }
    requestAnimationFrame(frame);
  }

  // Init backend: prefer WebGL
  try {
    var webgl = initWebGL(canvas);
    if (webgl) {
      gl = webgl.gl;
      glProgram = webgl.program;
      glUniforms = webgl.uniforms;
      backend = "webgl";
    }
  } catch (e) {
    backend = "none";
    gl = null;
  }
  if (backend !== "webgl") {
    ctx2d = canvas.getContext("2d", { alpha: false });
    if (!ctx2d) {
      infoEl.textContent = "No canvas rendering available.";
    } else {
      backend = "cpu";
    }
  }

  // Perf / test surface: drive shipped paint paths without re-implementing math
  var MandelbrotApp = {
    getBackend: function () { return backend; },
    getSize: function () { return { w: imgW, h: imgH }; },
    getView: function () {
      return {
        centerX: view.centerX,
        centerY: view.centerY,
        planeWidth: view.planeWidth,
        maxIter: maxIter
      };
    },
    setView: function (centerX, centerY, planeWidth) {
      view.centerX = centerX;
      view.centerY = centerY;
      view.planeWidth = planeWidth;
    },
    iterationsForZoom: iterationsForZoom,
    /**
     * Time a full-frame paint of the active backend (WebGL with gl.finish, or CPU sync).
     * Optionally override size by temporarily resizing canvas buffers.
     */
    paintFullFrameSync: function (opts) {
      opts = opts || {};
      var w = opts.w || imgW;
      var h = opts.h || imgH;
      var cx = opts.centerX != null ? opts.centerX : view.centerX;
      var cy = opts.centerY != null ? opts.centerY : view.centerY;
      var pw = opts.planeWidth != null ? opts.planeWidth : view.planeWidth;
      var mi = opts.maxIter != null ? opts.maxIter : iterationsForZoom(pw);

      var prev = {
        w: imgW, h: imgH,
        cx: view.centerX, cy: view.centerY, pw: view.planeWidth, mi: maxIter,
        cssW: canvas.style.width, cssH: canvas.style.height
      };

      var sizeChanged = w !== imgW || h !== imgH;
      imgW = w;
      imgH = h;
      view.centerX = cx;
      view.centerY = cy;
      view.planeWidth = pw;
      maxIter = mi;

      if (sizeChanged) {
        canvas.width = w;
        canvas.height = h;
        if (backend === "webgl" || gl) {
          gl = null;
          glProgram = null;
          glUniforms = null;
        }
      }

      if (backend === "cpu" || (!gl && backend !== "webgl")) {
        if (!ctx2d) ctx2d = canvas.getContext("2d", { alpha: false });
        if (ctx2d) imageData = ctx2d.createImageData(w, h);
      }

      // Rebuild GL after size change before timing the actual paint
      if (backend === "webgl") {
        ensureWebGL();
      }

      var usedBackend = backend;
      var t0 = performance.now();
      if (backend === "webgl" && gl) {
        paintWebGL(true);
        usedBackend = "webgl";
      } else {
        if (!imageData && ctx2d) imageData = ctx2d.createImageData(w, h);
        paintCpuFullFrame(w, h, cx, cy, pw, mi, imageData.data);
        ctx2d.putImageData(imageData, 0, 0);
        usedBackend = "cpu";
      }
      var t1 = performance.now();

      // restore interactive size/view
      imgW = prev.w;
      imgH = prev.h;
      view.centerX = prev.cx;
      view.centerY = prev.cy;
      view.planeWidth = prev.pw;
      maxIter = prev.mi;
      if (sizeChanged) {
        canvas.width = prev.w;
        canvas.height = prev.h;
        if (backend === "webgl") {
          gl = null;
          glProgram = null;
          glUniforms = null;
          ensureWebGL();
        }
      }
      if (backend === "cpu" && ctx2d) {
        imageData = ctx2d.createImageData(prev.w, prev.h);
      }
      dirty = true;

      return { ms: t1 - t0, backend: usedBackend, w: w, h: h, maxIter: mi };
    },
    /** Always times the shipped CPU full-frame path (baseline reference). */
    paintCpuFullFrameSync: function (opts) {
      opts = opts || {};
      var w = opts.w || 960;
      var h = opts.h || 640;
      var cx = opts.centerX != null ? opts.centerX : -0.743643887037151;
      var cy = opts.centerY != null ? opts.centerY : 0.13182590420533;
      var pw = opts.planeWidth != null ? opts.planeWidth : 0.002;
      var mi = opts.maxIter != null ? opts.maxIter : 512;
      var buf = new Uint8ClampedArray(w * h * 4);
      var t0 = performance.now();
      paintCpuFullFrame(w, h, cx, cy, pw, mi, buf);
      var t1 = performance.now();
      return { ms: t1 - t0, backend: "cpu", w: w, h: h, maxIter: mi, bytes: buf.length };
    },
    /**
     * Sample unique RGB colors on a grid from the current framebuffer.
     */
    sampleUniqueColors: function (step) {
      step = step || 8;
      var w = imgW, h = imgH;
      var pixels;
      if (backend === "webgl" && gl) {
        pixels = new Uint8Array(w * h * 4);
        gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
      } else if (ctx2d) {
        pixels = ctx2d.getImageData(0, 0, w, h).data;
      } else {
        return { unique: 0, samples: 0, backend: backend };
      }
      var set = {};
      var count = 0;
      var unique = 0;
      for (var y = 0; y < h; y += step) {
        for (var x = 0; x < w; x += step) {
          var i = (y * w + x) * 4;
          var key = pixels[i] + "," + pixels[i + 1] + "," + pixels[i + 2];
          count++;
          if (!set[key]) {
            set[key] = 1;
            unique++;
          }
        }
      }
      return { unique: unique, samples: count, backend: backend, w: w, h: h };
    },
    /**
     * Paint a fixed deep window on the live backend and sample uniqueness
     * before restoring the interactive view (so the frame is still readable).
     */
    deepZoomQuality: function (opts) {
      opts = opts || {};
      var w = opts.w || 320;
      var h = opts.h || 240;
      var cx = opts.centerX != null ? opts.centerX : -0.743643887037151;
      var cy = opts.centerY != null ? opts.centerY : 0.13182590420533;
      var pw = opts.planeWidth != null ? opts.planeWidth : 1e-7;
      var mi = opts.maxIter != null ? opts.maxIter : 2048;
      var step = opts.step || 4;

      var prev = {
        w: imgW, h: imgH,
        cx: view.centerX, cy: view.centerY, pw: view.planeWidth, mi: maxIter
      };

      imgW = w;
      imgH = h;
      view.centerX = cx;
      view.centerY = cy;
      view.planeWidth = pw;
      maxIter = mi;
      canvas.width = w;
      canvas.height = h;
      if (backend === "webgl") {
        gl = null;
        glProgram = null;
        glUniforms = null;
        ensureWebGL();
      } else if (ctx2d) {
        imageData = ctx2d.createImageData(w, h);
      }

      if (backend === "webgl" && gl) {
        paintWebGL(true);
      } else {
        if (!imageData && ctx2d) imageData = ctx2d.createImageData(w, h);
        paintCpuFullFrame(w, h, cx, cy, pw, mi, imageData.data);
        ctx2d.putImageData(imageData, 0, 0);
      }

      var metrics = this.sampleUniqueColors(step);
      var dataUrl = null;
      try {
        dataUrl = canvas.toDataURL("image/png");
      } catch (e) {
        dataUrl = null;
      }
      metrics.dataUrl = dataUrl;

      imgW = prev.w;
      imgH = prev.h;
      view.centerX = prev.cx;
      view.centerY = prev.cy;
      view.planeWidth = prev.pw;
      maxIter = prev.mi;
      canvas.width = prev.w;
      canvas.height = prev.h;
      if (backend === "webgl") {
        gl = null;
        glProgram = null;
        glUniforms = null;
        ensureWebGL();
      } else if (ctx2d) {
        imageData = ctx2d.createImageData(prev.w, prev.h);
      }
      dirty = true;
      return metrics;
    }
  };
  if (typeof globalThis !== "undefined") {
    globalThis.MandelbrotApp = MandelbrotApp;
  }

  // ── Input: pan + wheel zoom + Ctrl+drag marquee ────────────────────────

  var pointers = new Map();
  var lastPinchDist = 0;
  var marqueeEl = document.getElementById("marquee");
  var marquee = null;

  function cssToPixel(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * dpr,
      y: (clientY - rect.top) * dpr
    };
  }

  function updateMarqueeEl() {
    if (!marquee) {
      marqueeEl.style.display = "none";
      return;
    }
    var left = Math.min(marquee.x0, marquee.x1);
    var top = Math.min(marquee.y0, marquee.y1);
    var width = Math.abs(marquee.x1 - marquee.x0);
    var height = Math.abs(marquee.y1 - marquee.y0);
    marqueeEl.style.display = "block";
    marqueeEl.style.left = left + "px";
    marqueeEl.style.top = top + "px";
    marqueeEl.style.width = width + "px";
    marqueeEl.style.height = height + "px";
  }

  var ctrlHeld = false;

  function clearMarquee() {
    marquee = null;
    canvas.classList.remove("selecting");
    if (ctrlHeld) canvas.classList.add("ctrl-ready");
    updateMarqueeEl();
  }

  function setCtrlHeld(down) {
    ctrlHeld = down;
    if (marquee) return;
    if (down) {
      canvas.classList.add("ctrl-ready");
      canvas.classList.remove("dragging");
    } else {
      canvas.classList.remove("ctrl-ready");
    }
  }
  window.addEventListener("keydown", function (e) {
    if (e.key === "Control") setCtrlHeld(true);
  });
  window.addEventListener("keyup", function (e) {
    if (e.key === "Control") setCtrlHeld(false);
  });
  window.addEventListener("blur", function () {
    setCtrlHeld(false);
  });

  function applyMarqueeZoom() {
    if (!marquee) return;
    var p0 = cssToPixel(marquee.x0, marquee.y0);
    var p1 = cssToPixel(marquee.x1, marquee.y1);
    var z = zoomToRect(
      p0.x, p0.y, p1.x, p1.y,
      imgW, imgH,
      view.centerX, view.centerY, view.planeWidth
    );
    if (z) {
      view.centerX = z.centerX;
      view.centerY = z.centerY;
      view.planeWidth = z.planeWidth;
      requestRender();
    }
  }

  canvas.addEventListener("pointerdown", function (e) {
    if (e.ctrlKey && e.button === 0) {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      marquee = {
        pointerId: e.pointerId,
        x0: e.clientX,
        y0: e.clientY,
        x1: e.clientX,
        y1: e.clientY
      };
      canvas.classList.remove("ctrl-ready", "dragging");
      canvas.classList.add("selecting");
      updateMarqueeEl();
      return;
    }

    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 1 && !ctrlHeld) canvas.classList.add("dragging");
    if (pointers.size === 2) {
      var pts = Array.from(pointers.values());
      var dx = pts[0].x - pts[1].x;
      var dy = pts[0].y - pts[1].y;
      lastPinchDist = Math.hypot(dx, dy);
    }
  });

  canvas.addEventListener("pointermove", function (e) {
    if (e.ctrlKey !== ctrlHeld && !marquee) setCtrlHeld(e.ctrlKey);

    if (marquee && e.pointerId === marquee.pointerId) {
      marquee.x1 = e.clientX;
      marquee.y1 = e.clientY;
      updateMarqueeEl();
      return;
    }

    if (!pointers.has(e.pointerId)) return;
    var prev = pointers.get(e.pointerId);
    var dx = e.clientX - prev.x;
    var dy = e.clientY - prev.y;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pointers.size === 1) {
      var next = panByPixels(dx * dpr, dy * dpr, imgW, imgH, view.centerX, view.centerY, view.planeWidth);
      view.centerX = next.centerX;
      view.centerY = next.centerY;
      requestRender();
    } else if (pointers.size === 2) {
      var pts = Array.from(pointers.values());
      var pdx = pts[0].x - pts[1].x;
      var pdy = pts[0].y - pts[1].y;
      var dist = Math.hypot(pdx, pdy);
      if (lastPinchDist > 0 && dist > 0) {
        var factor = lastPinchDist / dist;
        var midX = (pts[0].x + pts[1].x) / 2;
        var midY = (pts[0].y + pts[1].y) / 2;
        var pix = cssToPixel(midX, midY);
        var z = zoomAtPoint(pix.x, pix.y, imgW, imgH, view.centerX, view.centerY, view.planeWidth, factor);
        view.centerX = z.centerX;
        view.centerY = z.centerY;
        view.planeWidth = z.planeWidth;
        requestRender();
      }
      lastPinchDist = dist;
    }
  });

  function endPointer(e) {
    if (marquee && e.pointerId === marquee.pointerId) {
      applyMarqueeZoom();
      clearMarquee();
      return;
    }
    pointers.delete(e.pointerId);
    if (pointers.size < 2) lastPinchDist = 0;
    if (pointers.size === 0) canvas.classList.remove("dragging");
  }
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", function (e) {
    if (marquee && e.pointerId === marquee.pointerId) {
      clearMarquee();
      return;
    }
    endPointer(e);
  });
  canvas.addEventListener("pointerleave", function (e) {
    if (pointers.has(e.pointerId) && e.buttons === 0) endPointer(e);
  });

  canvas.addEventListener("wheel", function (e) {
    e.preventDefault();
    var pix = cssToPixel(e.clientX, e.clientY);
    var factor = Math.exp(e.deltaY * 0.0015);
    if (factor < 0.5) factor = 0.5;
    if (factor > 2) factor = 2;
    var z = zoomAtPoint(pix.x, pix.y, imgW, imgH, view.centerX, view.centerY, view.planeWidth, factor);
    view.centerX = z.centerX;
    view.centerY = z.centerY;
    view.planeWidth = z.planeWidth;
    requestRender();
  }, { passive: false });

  document.getElementById("btn-reset").addEventListener("click", function () {
    view.centerX = DEFAULT_CENTER_X;
    view.centerY = DEFAULT_CENTER_Y;
    view.planeWidth = DEFAULT_PLANE_WIDTH;
    requestRender();
  });

  window.addEventListener("resize", function () {
    resize();
    requestRender();
  });

  resize();
  updateHud();
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
