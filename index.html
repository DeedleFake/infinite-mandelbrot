<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mandelbrot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0c;
      color: #e8e8ec;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
      -webkit-user-select: none;
      user-select: none;
    }
    #c {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #c.dragging { cursor: grabbing; }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 1;
    }
    #info {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: rgba(232, 232, 236, 0.72);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
      line-height: 1.45;
      white-space: pre-line;
    }
    #actions {
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }
    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(18, 18, 22, 0.72);
      color: rgba(232, 232, 236, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 6px 12px;
      font: inherit;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    button:hover {
      background: rgba(36, 36, 44, 0.85);
      border-color: rgba(255, 255, 255, 0.28);
    }
    button:active {
      background: rgba(50, 50, 60, 0.9);
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="info"></div>
    <div id="actions">
      <button type="button" id="btn-reset" title="Reset view">Reset</button>
    </div>
  </div>
  <script>
(function () {
  "use strict";

  // ── Pure math (exported for tests via global) ──────────────────────────

  /**
   * Escape-time iteration for c = cx + i·cy.
   * Returns iteration count at escape (1..maxIter), or maxIter if |z| stayed ≤ 2.
   */
  function mandelbrotEscape(cx, cy, maxIter) {
    var zx = 0, zy = 0;
    var zx2 = 0, zy2 = 0;
    var i = 0;
    while (i < maxIter && zx2 + zy2 <= 4) {
      zy = 2 * zx * zy + cy;
      zx = zx2 - zy2 + cx;
      zx2 = zx * zx;
      zy2 = zy * zy;
      i++;
    }
    return i;
  }

  /**
   * Smooth escape count for exterior coloring (continuous banding).
   * Returns value in (0, maxIter] for exterior, maxIter for interior.
   */
  function mandelbrotSmooth(cx, cy, maxIter) {
    var zx = 0, zy = 0;
    var zx2 = 0, zy2 = 0;
    var i = 0;
    while (i < maxIter && zx2 + zy2 <= 256) {
      zy = 2 * zx * zy + cy;
      zx = zx2 - zy2 + cx;
      zx2 = zx * zx;
      zy2 = zy * zy;
      i++;
    }
    if (i >= maxIter) return maxIter;
    // nu = log2(log2(|z|)) continuous correction
    var logZn = Math.log(zx2 + zy2) / 2;
    var nu = Math.log(logZn / Math.LN2) / Math.LN2;
    return i + 1 - nu;
  }

  /** Map pixel (px, py) in a canvas of size (w, h) to complex plane given view. */
  function pixelToComplex(px, py, w, h, centerX, centerY, planeWidth) {
    var aspect = w / h;
    var planeHeight = planeWidth / aspect;
    var re = centerX + (px / w - 0.5) * planeWidth;
    var im = centerY - (py / h - 0.5) * planeHeight;
    return { re: re, im: im };
  }

  /**
   * Zoom about a pixel so that pixel's complex point stays fixed.
   * factor < 1 zooms in, > 1 zooms out.
   */
  function zoomAtPoint(px, py, w, h, centerX, centerY, planeWidth, factor) {
    var before = pixelToComplex(px, py, w, h, centerX, centerY, planeWidth);
    var newWidth = planeWidth * factor;
    // Keep newWidth in a sane float64 range (no artificial UX cap; only numeric floor)
    if (newWidth < Number.MIN_VALUE * 1e6) newWidth = Number.MIN_VALUE * 1e6;
    if (!isFinite(newWidth) || newWidth > 1e6) newWidth = Math.min(planeWidth * factor, 1e6);
    var after = pixelToComplex(px, py, w, h, centerX, centerY, newWidth);
    return {
      centerX: centerX + (before.re - after.re),
      centerY: centerY + (before.im - after.im),
      planeWidth: newWidth
    };
  }

  /** Pan by pixel deltas → new center. dy positive is downward (screen). */
  function panByPixels(dx, dy, w, h, centerX, centerY, planeWidth) {
    var aspect = w / h;
    var planeHeight = planeWidth / aspect;
    return {
      centerX: centerX - (dx / w) * planeWidth,
      centerY: centerY + (dy / h) * planeHeight,
      planeWidth: planeWidth
    };
  }

  // Expose pure API for Node tests (no DOM dependency)
  var MandelbrotMath = {
    mandelbrotEscape: mandelbrotEscape,
    mandelbrotSmooth: mandelbrotSmooth,
    pixelToComplex: pixelToComplex,
    zoomAtPoint: zoomAtPoint,
    panByPixels: panByPixels
  };
  if (typeof globalThis !== "undefined") {
    globalThis.MandelbrotMath = MandelbrotMath;
  }

  // ── View state ─────────────────────────────────────────────────────────

  var DEFAULT_CENTER_X = -0.5;
  var DEFAULT_CENTER_Y = 0;
  var DEFAULT_PLANE_WIDTH = 3.5;

  var view = {
    centerX: DEFAULT_CENTER_X,
    centerY: DEFAULT_CENTER_Y,
    planeWidth: DEFAULT_PLANE_WIDTH
  };

  var maxIter = 256;

  function iterationsForZoom(planeWidth) {
    // More iterations as we zoom in; soft floor/ceiling
    var base = 128;
    var depth = Math.max(0, -Math.log2(planeWidth / DEFAULT_PLANE_WIDTH));
    return Math.min(4096, Math.floor(base + depth * 48));
  }

  // ── Canvas / render ───────────────────────────────────────────────────

  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d", { alpha: false });
  var infoEl = document.getElementById("info");
  var dpr = 1;
  var imgW = 0, imgH = 0;
  var imageData = null;
  var dirty = true;
  var rendering = false;
  var renderToken = 0;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    var cssW = window.innerWidth;
    var cssH = window.innerHeight;
    imgW = Math.max(1, Math.floor(cssW * dpr));
    imgH = Math.max(1, Math.floor(cssH * dpr));
    canvas.width = imgW;
    canvas.height = imgH;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    imageData = ctx.createImageData(imgW, imgH);
    dirty = true;
  }

  /** HSL-like palette: interior black, exterior smooth bands. */
  function colorFor(t, maxIt, out, off) {
    if (t >= maxIt) {
      out[off] = 8;
      out[off + 1] = 8;
      out[off + 2] = 12;
      out[off + 3] = 255;
      return;
    }
    // Normalize and apply a clean multi-stop gradient
    var v = t / maxIt;
    var hue = (0.62 + 4.5 * v) % 1;
    var sat = 0.72;
    var lit = 0.12 + 0.55 * Math.pow(v, 0.55);
    // HSL → RGB
    var c = (1 - Math.abs(2 * lit - 1)) * sat;
    var x = c * (1 - Math.abs((hue * 6) % 2 - 1));
    var m = lit - c / 2;
    var r = 0, g = 0, b = 0;
    var h6 = hue * 6;
    if (h6 < 1) { r = c; g = x; b = 0; }
    else if (h6 < 2) { r = x; g = c; b = 0; }
    else if (h6 < 3) { r = 0; g = c; b = x; }
    else if (h6 < 4) { r = 0; g = x; b = c; }
    else if (h6 < 5) { r = x; g = 0; b = c; }
    else { r = c; g = 0; b = x; }
    out[off] = Math.round((r + m) * 255);
    out[off + 1] = Math.round((g + m) * 255);
    out[off + 2] = Math.round((b + m) * 255);
    out[off + 3] = 255;
  }

  function updateHud() {
    var zoom = DEFAULT_PLANE_WIDTH / view.planeWidth;
    var zoomStr = zoom >= 1e6
      ? zoom.toExponential(2)
      : zoom >= 1000
        ? zoom.toFixed(0)
        : zoom.toFixed(2);
    infoEl.textContent =
      "zoom ×" + zoomStr +
      "\niter " + maxIter +
      "\n" + view.centerX.toPrecision(8) + " + " + view.centerY.toPrecision(8) + "i";
  }

  function renderChunked(token) {
    if (token !== renderToken) return;
    maxIter = iterationsForZoom(view.planeWidth);
    var data = imageData.data;
    var w = imgW, h = imgH;
    var cx = view.centerX, cy = view.centerY, pw = view.planeWidth;
    var aspect = w / h;
    var ph = pw / aspect;
    var re0 = cx - pw / 2;
    var im0 = cy + ph / 2;
    var dre = pw / w;
    var dim = -ph / h;

    var rowsPerChunk = Math.max(4, Math.floor(120000 / w));
    var y = 0;

    function step() {
      if (token !== renderToken) return;
      var yEnd = Math.min(h, y + rowsPerChunk);
      for (; y < yEnd; y++) {
        var im = im0 + y * dim;
        var rowOff = y * w * 4;
        for (var x = 0; x < w; x++) {
          var re = re0 + x * dre;
          var t = mandelbrotSmooth(re, im, maxIter);
          colorFor(t, maxIter, data, rowOff + x * 4);
        }
      }
      ctx.putImageData(imageData, 0, 0);
      if (y < h) {
        requestAnimationFrame(step);
      } else {
        rendering = false;
        updateHud();
      }
    }
    requestAnimationFrame(step);
  }

  function requestRender() {
    dirty = true;
  }

  function frame() {
    if (dirty && !rendering) {
      dirty = false;
      rendering = true;
      renderToken++;
      renderChunked(renderToken);
    } else if (dirty && rendering) {
      // Cancel in-progress pass and restart with latest view
      dirty = false;
      renderToken++;
      renderChunked(renderToken);
    }
    requestAnimationFrame(frame);
  }

  // ── Input: pan + wheel zoom ────────────────────────────────────────────

  var pointers = new Map();
  var lastPinchDist = 0;

  function cssToPixel(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * dpr,
      y: (clientY - rect.top) * dpr
    };
  }

  canvas.addEventListener("pointerdown", function (e) {
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 1) canvas.classList.add("dragging");
    if (pointers.size === 2) {
      var pts = Array.from(pointers.values());
      var dx = pts[0].x - pts[1].x;
      var dy = pts[0].y - pts[1].y;
      lastPinchDist = Math.hypot(dx, dy);
    }
  });

  canvas.addEventListener("pointermove", function (e) {
    if (!pointers.has(e.pointerId)) return;
    var prev = pointers.get(e.pointerId);
    var dx = e.clientX - prev.x;
    var dy = e.clientY - prev.y;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pointers.size === 1) {
      var next = panByPixels(dx * dpr, dy * dpr, imgW, imgH, view.centerX, view.centerY, view.planeWidth);
      view.centerX = next.centerX;
      view.centerY = next.centerY;
      requestRender();
    } else if (pointers.size === 2) {
      var pts = Array.from(pointers.values());
      var pdx = pts[0].x - pts[1].x;
      var pdy = pts[0].y - pts[1].y;
      var dist = Math.hypot(pdx, pdy);
      if (lastPinchDist > 0 && dist > 0) {
        var factor = lastPinchDist / dist;
        var midX = (pts[0].x + pts[1].x) / 2;
        var midY = (pts[0].y + pts[1].y) / 2;
        var pix = cssToPixel(midX, midY);
        var z = zoomAtPoint(pix.x, pix.y, imgW, imgH, view.centerX, view.centerY, view.planeWidth, factor);
        view.centerX = z.centerX;
        view.centerY = z.centerY;
        view.planeWidth = z.planeWidth;
        requestRender();
      }
      lastPinchDist = dist;
    }
  });

  function endPointer(e) {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) lastPinchDist = 0;
    if (pointers.size === 0) canvas.classList.remove("dragging");
  }
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);
  canvas.addEventListener("pointerleave", function (e) {
    if (pointers.has(e.pointerId) && e.buttons === 0) endPointer(e);
  });

  canvas.addEventListener("wheel", function (e) {
    e.preventDefault();
    var pix = cssToPixel(e.clientX, e.clientY);
    // Smooth exponential zoom; deltaY > 0 → zoom out
    var factor = Math.exp(e.deltaY * 0.0015);
    // Clamp single-step to avoid wild jumps
    if (factor < 0.5) factor = 0.5;
    if (factor > 2) factor = 2;
    var z = zoomAtPoint(pix.x, pix.y, imgW, imgH, view.centerX, view.centerY, view.planeWidth, factor);
    view.centerX = z.centerX;
    view.centerY = z.centerY;
    view.planeWidth = z.planeWidth;
    requestRender();
  }, { passive: false });

  document.getElementById("btn-reset").addEventListener("click", function () {
    view.centerX = DEFAULT_CENTER_X;
    view.centerY = DEFAULT_CENTER_Y;
    view.planeWidth = DEFAULT_PLANE_WIDTH;
    requestRender();
  });

  window.addEventListener("resize", function () {
    resize();
    requestRender();
  });

  resize();
  updateHud();
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
